name: Android Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version_tag:
        description: 'Release tag (example: v1.2.0)'
        required: true
      target_ref:
        description: 'Git ref to release from'
        required: false
        default: 'main'

jobs:
  release:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Resolve release metadata
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            RELEASE_TAG="${{ inputs.version_tag }}"
            TARGET_REF="${{ inputs.target_ref }}"
          else
            RELEASE_TAG="${GITHUB_REF#refs/tags/}"
            TARGET_REF="${GITHUB_REF}"
          fi

          VERSION_NAME="${RELEASE_TAG#v}"
          echo "RELEASE_TAG=$RELEASE_TAG" >> "$GITHUB_ENV"
          echo "TARGET_REF=$TARGET_REF" >> "$GITHUB_ENV"
          echo "VERSION_NAME=$VERSION_NAME" >> "$GITHUB_ENV"

      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ env.TARGET_REF }}
          fetch-depth: 0

      - name: Compute version code
        run: |
          VERSION_CODE=$(git rev-list --count HEAD)
          APK_FILE_NAME="ssh-tunneling-${RELEASE_TAG}.apk"
          echo "VERSION_CODE=$VERSION_CODE" >> "$GITHUB_ENV"
          echo "APK_FILE_NAME=$APK_FILE_NAME" >> "$GITHUB_ENV"

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v4

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Decode release keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > "$RUNNER_TEMP/release-keystore.jks"

      - name: Assemble signed release APK
        env:
          VERSION_CODE: ${{ env.VERSION_CODE }}
          VERSION_NAME: ${{ env.VERSION_NAME }}
          ANDROID_KEYSTORE_PATH: ${{ runner.temp }}/release-keystore.jks
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: ./gradlew --no-daemon --stacktrace :app:assembleRelease

      - name: Prepare release assets
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          mkdir -p release-assets
          cp app/build/outputs/apk/release/app-release.apk "release-assets/${APK_FILE_NAME}"
          APK_SHA256=$(sha256sum "release-assets/${APK_FILE_NAME}" | cut -d ' ' -f 1)
          RELEASED_AT=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          cat > release-assets/manifest.json <<EOF
          {
            "versionName": "${VERSION_NAME}",
            "versionCode": ${VERSION_CODE},
            "tag": "${RELEASE_TAG}",
            "apkUrl": "https://github.com/${GITHUB_REPOSITORY}/releases/download/${RELEASE_TAG}/${APK_FILE_NAME}",
            "sha256": "${APK_SHA256}",
            "releaseNotesUrl": "https://github.com/${GITHUB_REPOSITORY}/releases/tag/${RELEASE_TAG}",
            "releasedAt": "${RELEASED_AT}"
          }
          EOF

      - name: Upload release APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ssh-tunneling-release-apk-${{ env.RELEASE_TAG }}
          path: |
            release-assets/${{ env.APK_FILE_NAME }}
            release-assets/manifest.json
          if-no-files-found: error

      - name: Create or update GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: |
            release-assets/${{ env.APK_FILE_NAME }}
            release-assets/manifest.json
          generate_release_notes: true
          body: |
            - Version name: ${{ env.VERSION_NAME }}
            - Version code: ${{ env.VERSION_CODE }}
            - Source ref: ${{ env.TARGET_REF }}
            - Commit: ${{ github.sha }}
        env:
          GITHUB_TOKEN: ${{ github.token }}
