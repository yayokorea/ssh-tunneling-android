name: Android Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version_tag:
        description: 'Release tag (example: v1.2.0)'
        required: true
      target_ref:
        description: 'Git ref to release from'
        required: false
        default: 'main'

jobs:
  release:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Resolve release metadata
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            RELEASE_TAG="${{ inputs.version_tag }}"
            TARGET_REF="${{ inputs.target_ref }}"
          else
            RELEASE_TAG="${GITHUB_REF#refs/tags/}"
            TARGET_REF="${GITHUB_REF}"
          fi

          VERSION_NAME="${RELEASE_TAG#v}"
          echo "RELEASE_TAG=$RELEASE_TAG" >> "$GITHUB_ENV"
          echo "TARGET_REF=$TARGET_REF" >> "$GITHUB_ENV"
          echo "VERSION_NAME=$VERSION_NAME" >> "$GITHUB_ENV"

      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ env.TARGET_REF }}
          fetch-depth: 0

      - name: Compute version code
        run: |
          VERSION_CODE=$(git rev-list --count HEAD)
          echo "VERSION_CODE=$VERSION_CODE" >> "$GITHUB_ENV"

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v4

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Decode release keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > "$RUNNER_TEMP/release-keystore.jks"

      - name: Assemble signed release APK
        env:
          VERSION_CODE: ${{ env.VERSION_CODE }}
          VERSION_NAME: ${{ env.VERSION_NAME }}
          ANDROID_KEYSTORE_PATH: ${{ runner.temp }}/release-keystore.jks
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: ./gradlew --no-daemon --stacktrace :app:assembleRelease

      - name: Upload release APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ssh-tunneling-release-apk-${{ env.RELEASE_TAG }}
          path: app/build/outputs/apk/release/app-release.apk
          if-no-files-found: error

      - name: Create or update GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          RELEASE_NOTES=$(cat <<EOF
          Automated release
          - Version name: ${VERSION_NAME}
          - Version code: ${VERSION_CODE}
          - Source ref: ${TARGET_REF}
          - Commit: ${GITHUB_SHA}
          EOF
          )

          if gh release view "${RELEASE_TAG}" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
            gh release edit "${RELEASE_TAG}" --repo "${GITHUB_REPOSITORY}" --title "${RELEASE_TAG}" --notes "${RELEASE_NOTES}"
            gh release upload "${RELEASE_TAG}" app/build/outputs/apk/release/app-release.apk --repo "${GITHUB_REPOSITORY}" --clobber
          else
            gh release create "${RELEASE_TAG}" app/build/outputs/apk/release/app-release.apk --repo "${GITHUB_REPOSITORY}" --target "${TARGET_REF}" --title "${RELEASE_TAG}" --notes "${RELEASE_NOTES}"
          fi
